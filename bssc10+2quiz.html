        let currentScore = 0;
        
        const dateSelect = document.getElementById('dateSelect');
        const langSelect = document.getElementById('langSelect');
        const quizContainer = document.getElementById('quizContainer');
        const scoreElement = document.getElementById('score');

        // --- TIMER LOGIC (135 Mins) ---
        let totalSeconds = 135 * 60; // 135 minutes converted to seconds
        const timeElement = document.getElementById('time');
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval); // Reset if already running
            totalSeconds = 135 * 60; // Reset to 135 mins whenever quiz is rendered
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                totalSeconds--;
                updateTimerDisplay();

                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    alert("Time's Up! Your quiz is now locked.");
                    disableAllOptions(); // Lock quiz
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;

            // Formatting to MM:SS or HH:MM:SS
            timeElement.innerText = 
                (hours < 10 ? "0" + hours : hours) + ":" + 
                (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                (seconds < 10 ? "0" + seconds : seconds);
        }

        function disableAllOptions() {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.disabled = true);
        }
        // ------------------------------

        // Function to build and render the quiz based on selected filters
        function renderQuiz() {
            const date = dateSelect.value;
            const lang = langSelect.value;
            
            // Check if data exists before rendering to avoid errors
            if(!quizData[date]) {
                quizContainer.innerHTML = '<h3 style="text-align:center;">Please add Quiz Data</h3>';
                return;
            }

            const questions = quizData[date];
            quizContainer.innerHTML = ''; // Clear previous questions
            
            // Start or Restart Timer when new exam paper is loaded
            startTimer();
            
            // Reset Score for new paper
            currentScore = 0;
            scoreElement.innerText = currentScore;

            questions.forEach((q, index) => {
                const questionText = lang === 'EN' ? q.questionEN : q.questionHI;
                const explanationText = lang === 'EN' ? q.explanationEN : q.explanationHI;
                
                // Create Card
                const card = document.createElement('div');
                card.className = 'question-card';

                // Question Title
                const title = document.createElement('div');
                title.className = 'question-text';
                title.innerText = questionText;
                card.appendChild(title);

                // Options Grid
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';

                // Explanation Box
                const explanationBox = document.createElement('div');
                explanationBox.className = 'explanation';
                explanationBox.innerHTML = `<strong>Right Answer:</strong> ${explanationText}`;

                // Options Buttons
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = lang === 'EN' ? opt.textEN : opt.textHI;
                    
                    // Click Event Logic
                    btn.onclick = () => {
                        // If time is up, don't allow clicks (failsafe)
                        if(totalSeconds <= 0) {
                            alert("Time is up! You cannot answer anymore.");
                            return;
                        }

                        // Disable all buttons in this grid
                        const allBtns = optionsGrid.querySelectorAll('.option-btn');
                        allBtns.forEach(b => b.disabled = true);

                        if (opt.isCorrect) {
                            btn.classList.add('correct');
                            currentScore += 4;
                        } else {
                            btn.classList.add('wrong');
                            currentScore -= 1;
                            
                            // Highlight the correct answer if a wrong one was clicked
                            allBtns.forEach((b, i) => {
                                if (q.options[i].isCorrect) {
                                    b.classList.add('correct');
                                }
                            });
                        }
                        
                        // Update Live Score
                        scoreElement.innerText = currentScore;
                        
                        // Show Explanation
                        explanationBox.style.display = 'block';
                    };
                    optionsGrid.appendChild(btn);
                });

                card.appendChild(optionsGrid);
                card.appendChild(explanationBox);
                quizContainer.appendChild(card);
            });
        }

        // Listen for changes in Date or Language
        dateSelect.addEventListener('change', renderQuiz);
        langSelect.addEventListener('change', renderQuiz);

        // Initial render
        renderQuiz();
    </script>
</body>
</html>
