        .dropdown {

            background-color: #61abbd;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #2c4b2b;
            min-width: 200px;
            box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2);
            z-index: 1;
            border-radius: 5px;
            overflow: hidden;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background-color 0.3s ease;
        }

        .dropdown-content a:hover {

        a {

            color: #2e262c;
            margin-top: 2rem;
            padding: 10px 15px;
            border: 1px solid #292b2d;
            border-radius: 5px;
            transition: background-color 0.3s ease, color 0.3s ease;
            background-color: rgba(255, 255, 255, 0.8);
        }

        a:hover {
            background-color: #716aab;
            color: rgb(102, 142, 116);
        }

        .dropdown-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .dropdown {
                width: 100%;
                margin: 0.5rem 0;
            }

            .dropdown-content {
                width: 100%;
            }

            .dropdown span {
                width: 100%;
                text-align: center;
            }

            .dropdown-container {
                flex-direction: column;
                align-items: center;
            }

            a {
                width: 80%;
                text-align: center;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .dropdown {
                width: 45%;
                margin: 0.5rem;
            }

            a {
                width: 50%;
                text-align: center;
