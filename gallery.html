<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            color: #333;
        }

        h1 {
            color: #007bff;
            margin-top: 2rem;
            text-align: center;
        }

        h2 {
            margin-top: 2rem;
            color: #555;
            text-align: center;
        }

        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 1rem 0;
            width: 90%;
            max-width: 1200px;
        }

        .gallery-container img {
            width: 250px;
            height: auto;
            margin: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .gallery-container img:hover {
            transform: scale(1.05);
        }

        a {
            text-decoration: none;
            color: #007bff;
            padding: 10px 15px;
            border: 1px solid #007bff;
            border-radius: 5px;
            transition: background-color 0.3s ease, color 0.3s ease;
            margin-top: 2rem;
        }

        a:hover {
            background-color: #007bff;
            color: white;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .gallery-container img {
                width: 90%;
                margin: 0.5rem 0;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .gallery-container img {
                width: 45%;
                margin: 0.5rem;
            }
        }

        @media (min-width: 1025px) {
            .gallery-container img {
                width: 30%;
                margin: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <h1>Gallery</h1>

    <h2>Cultural Images</h2>
    <h4 style="color: rgb(58, 105, 74);">(send me message from anywhere to add or remove your image)</h4>
